services:
  rentmaestro:
    image: ghcr.io/patator33/rentmaestro:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/rentmaestro.db
    volumes:
      - rentmaestro_data:/app/data
      - rentmaestro_uploads:/app/public/uploads
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://127.0.0.1:3000 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  rentmaestro_data:
  rentmaestro_uploads:
