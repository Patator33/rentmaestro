services:
  rentmaestro:
    image: ghcr.io/patator33/rentmaestro:latest
    ports:
      - "3008:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/rentmaestro.db
      # Email Configuration (Gmail)
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=465
      - SMTP_USER=votre.email@gmail.com
      - SMTP_PASS=votre_mot_de_passe_d_application
      - SMTP_FROM="Rentmaestro" <votre.email@gmail.com>
      # Authentication (uncomment to enable login)
      # - AUTH_USERNAME=admin
      # - AUTH_PASSWORD=changeme
    volumes:
      - rentmaestro_data:/app/data
      - rentmaestro_uploads:/app/public/uploads
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://127.0.0.1:3000 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  rentmaestro_data:
  rentmaestro_uploads:
