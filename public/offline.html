<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors ligne — Rentmaestro</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      background: #0a0e1a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 3.5rem; }
    h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
    p  { color: #94a3b8; font-size: 0.9rem; max-width: 300px; margin: 0; }
    button {
      margin-top: 0.5rem;
      padding: 0.65rem 1.5rem;
      background: linear-gradient(135deg, #06b6d4, #8b5cf6);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📶</div>
  <h1>Vous êtes hors ligne</h1>
  <p>Vérifiez votre connexion internet. Les pages déjà visitées restent disponibles.</p>
  <button onclick="location.reload()">Réessayer</button>
</body>
</html>
